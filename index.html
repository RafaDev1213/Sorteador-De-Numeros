<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sorteador de numeros</title>
</head>
<body>
    <header>
        <h1 class="titulo">Sorteador <span>De Números</span></h1>
    </header>
    <div class="inputs">
        
        <div class="campo">
            <label for="Quantidade">Quantidade de numeros sorteados: </label>
            <input type="number" name="" id="quantidade">

        </div>

        <div class="campo">
            <label for="apartir">Apartir do numero:</label>
            <input type="number" name="" id="apartir">

        </div>

        <div class="campo">
            <label for="">Até o numero:</label>
            <input type="number" name="" id="ate">

        </div>




        

    </div>




    <div id="botoes">
        <input onclick="sortear()" type="button" value="sortear" id="Botaosortear" class="botao-ativo" sortear() >
        <input onclick="reiniciar()" type="button" value="reiniciar" id="Botaoreiniciar" class="botao-desativado" >
    </div>

    <div id="respostaNumeros">
        <h3>
            Numeros sorteados até agora: <span">NENHUM</span>
        </h3>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
